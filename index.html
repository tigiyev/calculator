<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>

	<link rel="stylesheet" href="styles.css">
	<script src="index.js"></script>
</head>

<body>
	<div class="content">

		<div class="calc-wr">

			<div class="calc">
				<div class="calc__content">
					<div class="calc__display">0</div>
					<div class="calc__inputs">
						<div class="calc__input-row">
							<div class="calc__btn">AC</div>
							<div class="calc__btn calc__btn_disabled"></div>
							<div class="calc__btn ">←</div>
							<div class="calc__btn">÷</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number">7</div>
							<div class="calc__btn calc__btn_number">8</div>
							<div class="calc__btn calc__btn_number">9</div>
							<div class="calc__btn">×</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number">4</div>
							<div class="calc__btn calc__btn_number">5</div>
							<div class="calc__btn calc__btn_number">6</div>
							<div class="calc__btn">-</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number">1</div>
							<div class="calc__btn calc__btn_number">2</div>
							<div class="calc__btn calc__btn_number">3</div>
							<div class="calc__btn">+</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number">+/-</div>
							<div class="calc__btn calc__btn_number">0</div>
							<div class="calc__btn calc__btn_number">.</div>
							<div class="calc__btn calc__btn_equal">=</div>
						</div>

					</div>
				</div>
			</div>
		</div>

	</div>

</body>


</html>
