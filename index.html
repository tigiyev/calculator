<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>

	<link rel="stylesheet" href="styles.css">
	<script src="index.js"></script>
</head>

<body>
	<div class="content">

		<div class="calc-wr">

			<div class="calc">
				<div class="calc__content">
					<div class="calc__display">

						<div class="calc__display__preview"></div>
						<div class="calc__display__content">0</div>
					</div>
					<div class="calc__inputs">
						<div class="calc__input-row">
							<div class="calc__btn" calc-role="clear">AC</div>
							<div class="calc__btn calc__btn_disabled"></div>
							<div class="calc__btn calc__btn_disabled">←</div>
							<div class="calc__btn" calc-operator="division">÷</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number" calc-number="7">7</div>
							<div class="calc__btn calc__btn_number" calc-number="8">8</div>
							<div class="calc__btn calc__btn_number" calc-number="9">9</div>
							<div class="calc__btn" calc-operator="multiply">×</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number" calc-number="4">4</div>
							<div class="calc__btn calc__btn_number" calc-number="5">5</div>
							<div class="calc__btn calc__btn_number" calc-number="6">6</div>
							<div class="calc__btn" calc-operator="subtract">-</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number" calc-number="1">1</div>
							<div class="calc__btn calc__btn_number" calc-number="2">2</div>
							<div class="calc__btn calc__btn_number" calc-number="3">3</div>
							<div class="calc__btn" calc-operator="add">+</div>
						</div>
						<div class="calc__input-row">
							<div class="calc__btn calc__btn_number calc__btn_disabled">+/-</div>
							<div class="calc__btn calc__btn_number" calc-number="0">0</div>
							<div class="calc__btn calc__btn_number calc__btn_disabled">.</div>
							<div class="calc__btn calc__btn_equal" calc-equal="equal">=</div>
						</div>

					</div>
				</div>
			</div>
		</div>

	</div>

</body>


</html>
